<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>
<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}
.form-box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#ff5722;
    color:white;
    border:none;
}
</style>
</head>
<body>

<div class="form-box">
<h2>Register</h2>

<form action="register" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="address" placeholder="Address">


<button type="submit">Register</button>

</form>

</div>

</body>
</html>
